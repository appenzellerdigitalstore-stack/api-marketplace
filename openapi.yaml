openapi: 3.0.3
info:
  title: SiteTrace API Suite
  version: 2.0.0
  description: >
    Ten website intelligence endpoints for SEO, crawlability, social previews,
    structured data, contact extraction, tech stack detection, security headers,
    lead scoring, and full website reports.
  contact:
    name: SiteTrace
servers:
  - url: https://api-marketplace-b73f.onrender.com
    description: Production Render service
security:
  - RapidApiKey: []
tags:
  - name: SEO
  - name: Crawlability
  - name: Social
  - name: Structured Data
  - name: Lead Generation
  - name: Web Intelligence
  - name: Security
  - name: Reports
paths:
  /health:
    get:
      summary: Health check
      description: Returns service status and the available API endpoints.
      operationId: getHealth
      tags:
        - Reports
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                service: sitetrace-api-suite
                endpoints:
                  - POST /api/seo-snapshot
                  - POST /api/security-headers
  /api/seo-snapshot:
    post:
      summary: SEO Snapshot
      description: Analyze a public URL and return on-page SEO metadata, headings, image alt coverage, links, social tag signals, and plan-dependent SEO analysis.
      operationId: seoSnapshot
      tags:
        - SEO
      parameters:
        - $ref: "#/components/parameters/RapidApiSubscription"
        - $ref: "#/components/parameters/SiteTracePlan"
      requestBody:
        $ref: "#/components/requestBodies/UrlRequest"
      responses:
        "200":
          description: SEO snapshot result.
          headers:
            X-RateLimit-Plan:
              $ref: "#/components/headers/XRateLimitPlan"
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseAnalysisResponse"
                  - type: object
                    properties:
                      page:
                        type: object
                        additionalProperties: true
                      images:
                        type: object
                        additionalProperties: true
                      links:
                        type: object
                        additionalProperties: true
                      social:
                        type: object
                        additionalProperties: true
                      seo_score:
                        type: integer
                      issues:
                        type: array
                        items:
                          type: object
                      recommendations:
                        type: array
                        items:
                          type: string
              example:
                success: true
                url: https://example.com/
                status_code: 200
                page:
                  title: Example Domain
                  h1_count: 1
                links:
                  total: 1
                  internal: 0
                  external: 1
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamFailure"
  /api/robots-analyzer:
    post:
      summary: Robots Analyzer
      description: Fetch and parse a site's robots.txt file, including user-agent groups, allow/disallow rules, crawl-delay values, sitemap declarations, and insights.
      operationId: robotsAnalyzer
      tags:
        - Crawlability
      parameters:
        - $ref: "#/components/parameters/RapidApiSubscription"
        - $ref: "#/components/parameters/SiteTracePlan"
      requestBody:
        $ref: "#/components/requestBodies/UrlRequest"
      responses:
        "200":
          description: Robots.txt analysis result.
          headers:
            X-RateLimit-Plan:
              $ref: "#/components/headers/XRateLimitPlan"
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseDomainResponse"
                  - type: object
                    properties:
                      robots_url:
                        type: string
                      found:
                        type: boolean
                      groups:
                        type: array
                        items:
                          type: object
                      sitemaps:
                        type: array
                        items:
                          type: string
                      insights:
                        type: array
                        items:
                          type: object
              example:
                success: true
                domain: example.com
                robots_url: https://example.com/robots.txt
                found: false
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamFailure"
  /api/sitemap-analyzer:
    post:
      summary: Sitemap Analyzer
      description: Discover, fetch, and analyze XML sitemaps from common sitemap paths and robots.txt hints.
      operationId: sitemapAnalyzer
      tags:
        - Crawlability
      parameters:
        - $ref: "#/components/parameters/RapidApiSubscription"
        - $ref: "#/components/parameters/SiteTracePlan"
      requestBody:
        $ref: "#/components/requestBodies/UrlRequest"
      responses:
        "200":
          description: Sitemap analysis result.
          headers:
            X-RateLimit-Plan:
              $ref: "#/components/headers/XRateLimitPlan"
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseDomainResponse"
                  - type: object
                    properties:
                      found:
                        type: boolean
                      sitemap_url:
                        type: string
                      total_urls:
                        type: integer
                      urls:
                        type: array
                        items:
                          type: object
                      insights:
                        type: array
                        items:
                          type: object
              example:
                success: true
                domain: example.com
                found: false
                message: No sitemap found. Tried /sitemap.xml, /sitemap_index.xml, and robots.txt hints.
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamFailure"
  /api/meta-preview:
    post:
      summary: Meta Preview
      description: Extract Open Graph, Twitter Card, LinkedIn, and basic page metadata for social previews.
      operationId: metaPreview
      tags:
        - Social
        - SEO
      parameters:
        - $ref: "#/components/parameters/RapidApiSubscription"
        - $ref: "#/components/parameters/SiteTracePlan"
      requestBody:
        $ref: "#/components/requestBodies/UrlRequest"
      responses:
        "200":
          description: Social preview metadata result.
          headers:
            X-RateLimit-Plan:
              $ref: "#/components/headers/XRateLimitPlan"
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseAnalysisResponse"
                  - type: object
                    properties:
                      basic:
                        type: object
                        additionalProperties: true
                      open_graph:
                        type: object
                        additionalProperties: true
                      twitter_card:
                        type: object
                        additionalProperties: true
                      previews:
                        type: object
                        additionalProperties: true
                      completeness_score:
                        type: integer
              example:
                success: true
                url: https://example.com/
                status_code: 200
                basic:
                  title: Example Domain
                  description: null
                has_og_image: false
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamFailure"
  /api/schema-detector:
    post:
      summary: Schema Detector
      description: Detect and parse structured data formats including JSON-LD, Microdata, and RDFa.
      operationId: schemaDetector
      tags:
        - Structured Data
        - SEO
      parameters:
        - $ref: "#/components/parameters/RapidApiSubscription"
        - $ref: "#/components/parameters/SiteTracePlan"
      requestBody:
        $ref: "#/components/requestBodies/UrlRequest"
      responses:
        "200":
          description: Structured data detection result.
          headers:
            X-RateLimit-Plan:
              $ref: "#/components/headers/XRateLimitPlan"
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseAnalysisResponse"
                  - type: object
                    properties:
                      schema_count:
                        type: integer
                      detected_types:
                        type: array
                        items:
                          type: string
                      rich_result_eligible:
                        type: boolean
                      schemas:
                        type: array
                        items:
                          type: object
                      insights:
                        type: array
                        items:
                          type: object
              example:
                success: true
                url: https://example.com/
                status_code: 200
                schema_count: 0
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamFailure"
  /api/contact-extractor:
    post:
      summary: Contact Extractor
      description: Extract public emails, phone numbers, social profile links, and address-like contact signals from a website.
      operationId: contactExtractor
      tags:
        - Lead Generation
      parameters:
        - $ref: "#/components/parameters/RapidApiSubscription"
        - $ref: "#/components/parameters/SiteTracePlan"
      requestBody:
        $ref: "#/components/requestBodies/UrlRequest"
      responses:
        "200":
          description: Contact extraction result.
          headers:
            X-RateLimit-Plan:
              $ref: "#/components/headers/XRateLimitPlan"
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseAnalysisResponse"
                  - type: object
                    properties:
                      emails:
                        type: array
                        items:
                          type: string
                      phones:
                        type: array
                        items:
                          type: string
                      social_profiles:
                        type: object
                        additionalProperties: true
                      counts:
                        type: object
                        additionalProperties: true
                      insights:
                        type: array
                        items:
                          type: object
              example:
                success: true
                url: https://example.com/
                status_code: 200
                emails: []
                phones: []
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamFailure"
  /api/tech-stack:
    post:
      summary: Tech Stack
      description: Detect website technologies from HTML, scripts, meta tags, cookies, and response headers.
      operationId: techStack
      tags:
        - Web Intelligence
      parameters:
        - $ref: "#/components/parameters/RapidApiSubscription"
        - $ref: "#/components/parameters/SiteTracePlan"
      requestBody:
        $ref: "#/components/requestBodies/UrlRequest"
      responses:
        "200":
          description: Technology detection result.
          headers:
            X-RateLimit-Plan:
              $ref: "#/components/headers/XRateLimitPlan"
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseAnalysisResponse"
                  - type: object
                    properties:
                      total_detected:
                        type: integer
                      technology_names:
                        type: array
                        items:
                          type: string
                      technologies:
                        type: array
                        items:
                          type: object
                      by_category:
                        type: object
                        additionalProperties: true
                      server_headers:
                        type: object
                        additionalProperties: true
              example:
                success: true
                url: https://example.com/
                status_code: 200
                total_detected: 1
                technology_names:
                  - HTML
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamFailure"
  /api/security-headers:
    post:
      summary: Security Headers
      description: Audit HTTP security headers and SSL metadata, returning a security score, grade, missing headers, and recommendations by plan.
      operationId: securityHeaders
      tags:
        - Security
      parameters:
        - $ref: "#/components/parameters/RapidApiSubscription"
        - $ref: "#/components/parameters/SiteTracePlan"
      requestBody:
        $ref: "#/components/requestBodies/UrlRequest"
      responses:
        "200":
          description: Security header audit result.
          headers:
            X-RateLimit-Plan:
              $ref: "#/components/headers/XRateLimitPlan"
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseAnalysisResponse"
                  - type: object
                    properties:
                      security_score:
                        type: integer
                      grade:
                        type: string
                      headers_present:
                        type: integer
                      headers_missing:
                        type: integer
                      ssl:
                        type: object
                        nullable: true
                      headers:
                        type: array
                        items:
                          type: object
              example:
                success: true
                url: https://example.com/
                status_code: 200
                grade: C
                headers_present: 2
                headers_missing: 7
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamFailure"
  /api/business-lead-score:
    post:
      summary: Business Lead Score
      description: Score a website as a B2B lead using contact, trust, technical, SEO, and buying-readiness signals.
      operationId: businessLeadScore
      tags:
        - Lead Generation
        - Web Intelligence
      parameters:
        - $ref: "#/components/parameters/RapidApiSubscription"
        - $ref: "#/components/parameters/SiteTracePlan"
      requestBody:
        $ref: "#/components/requestBodies/UrlRequest"
      responses:
        "200":
          description: Business lead scoring result.
          headers:
            X-RateLimit-Plan:
              $ref: "#/components/headers/XRateLimitPlan"
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseDomainResponse"
                  - type: object
                    properties:
                      lead_score:
                        type: integer
                      tier:
                        type: string
                      buying_readiness:
                        type: string
                      company_info:
                        type: object
                        additionalProperties: true
                      signals:
                        type: array
                        items:
                          type: object
              example:
                success: true
                url: https://example.com/
                domain: example.com
                status_code: 200
                lead_score: 42
                tier: Cold Lead
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamFailure"
  /api/report-generator:
    post:
      summary: Report Generator
      description: Generate a combined website audit report covering SEO, social metadata, performance, security, content, and crawlability signals.
      operationId: reportGenerator
      tags:
        - Reports
        - SEO
        - Security
      parameters:
        - $ref: "#/components/parameters/RapidApiSubscription"
        - $ref: "#/components/parameters/SiteTracePlan"
      requestBody:
        $ref: "#/components/requestBodies/UrlRequest"
      responses:
        "200":
          description: Full report result.
          headers:
            X-RateLimit-Plan:
              $ref: "#/components/headers/XRateLimitPlan"
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseDomainResponse"
                  - type: object
                    properties:
                      overall_score:
                        type: integer
                      overall_grade:
                        type: string
                      scores:
                        type: object
                        additionalProperties: true
                      seo:
                        type: object
                        additionalProperties: true
                      social:
                        type: object
                        additionalProperties: true
                      performance:
                        type: object
                        additionalProperties: true
                      security:
                        type: object
                        additionalProperties: true
                      crawlability:
                        type: object
                        additionalProperties: true
                      insights:
                        $ref: "#/components/schemas/AuditInsights"
              example:
                success: true
                url: https://example.com/
                domain: example.com
                status_code: 200
                overall_score: 80
                overall_grade: B
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamFailure"
  /api/email-finder:
    post:
      summary: Email Finder
      description: >
        Given a domain, crawls contact/about/team pages and generates common
        email patterns (info@, contact@, etc.), then verifies MX records for
        deliverability. Returns confidence-scored email addresses.
      operationId: emailFinder
      tags:
        - Lead Generation
      parameters:
        - $ref: "#/components/parameters/RapidApiSubscription"
        - $ref: "#/components/parameters/SiteTracePlan"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                domain:
                  type: string
                  example: example.com
                url:
                  type: string
                  example: https://example.com
      responses:
        "200":
          description: Email addresses found for the domain.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseAnalysisResponse"
              example:
                success: true
                data:
                  domain: example.com
                  mx_records_found: true
                  emails_found:
                    - email: hello@example.com
                      source: crawled
                      confidence: high
                  total_crawled: 1
                  plan: pro
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/seo-audit:
    post:
      summary: SEO Audit
      description: >
        Full on-page SEO audit: title, meta description, H1–H6 headings,
        image alt coverage, internal/external links, Open Graph, schema.org
        types, canonical URL, robots meta, and a 0–100 SEO score with grade.
      operationId: seoAudit
      tags:
        - SEO
      parameters:
        - $ref: "#/components/parameters/RapidApiSubscription"
        - $ref: "#/components/parameters/SiteTracePlan"
      requestBody:
        $ref: "#/components/requestBodies/UrlRequest"
      responses:
        "200":
          description: SEO audit result with score and recommendations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseAnalysisResponse"
              example:
                success: true
                data:
                  seo_score: 82
                  grade: B
                  issues: []
                  warnings:
                    - No canonical URL specified
                  passed:
                    - Title length is optimal
                    - Single H1 tag present
                  plan: pro
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/web-summarizer:
    post:
      summary: Web Summarizer & Reader
      description: >
        Extracts clean article content from any URL (removes ads, nav, sidebars)
        and returns an extractive summary, key bullet points, reading time,
        author, publish date, and word count.
      operationId: webSummarizer
      tags:
        - Web Intelligence
      parameters:
        - $ref: "#/components/parameters/RapidApiSubscription"
        - $ref: "#/components/parameters/SiteTracePlan"
      requestBody:
        $ref: "#/components/requestBodies/UrlRequest"
      responses:
        "200":
          description: Article summary and metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseAnalysisResponse"
              example:
                success: true
                data:
                  title: Article Title
                  summary: A concise extractive summary of the article content.
                  word_count: 1240
                  reading_time_min: 6
                  author: Jane Doe
                  plan: pro
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/company-intelligence:
    post:
      summary: Company Intelligence
      description: >
        Scrapes a company homepage for description, social links, contact info,
        tech stack (30+ fingerprints), founding year, employee count signals,
        and key pages (careers, blog, pricing). Returns structured company profile.
      operationId: companyIntelligence
      tags:
        - Lead Generation
        - Web Intelligence
      parameters:
        - $ref: "#/components/parameters/RapidApiSubscription"
        - $ref: "#/components/parameters/SiteTracePlan"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                domain:
                  type: string
                  example: stripe.com
                url:
                  type: string
                  example: https://stripe.com
      responses:
        "200":
          description: Company profile data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseAnalysisResponse"
              example:
                success: true
                data:
                  domain: stripe.com
                  company_name: Stripe
                  tech_stack:
                    - React
                    - Next.js
                    - Cloudflare
                  social_links:
                    twitter: https://twitter.com/stripe
                    linkedin: https://linkedin.com/company/stripe
                  plan: pro
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/review-scraper:
    post:
      summary: Review Scraper
      description: >
        Scrapes product or business reviews from public review pages including
        Trustpilot, G2, Capterra, and any schema.org-marked review page.
        Returns aggregate rating, individual reviews, and sentiment breakdown.
      operationId: reviewScraper
      tags:
        - Web Intelligence
      parameters:
        - $ref: "#/components/parameters/RapidApiSubscription"
        - $ref: "#/components/parameters/SiteTracePlan"
      requestBody:
        $ref: "#/components/requestBodies/UrlRequest"
      responses:
        "200":
          description: Reviews and aggregate rating.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseAnalysisResponse"
              example:
                success: true
                data:
                  platform: trustpilot
                  aggregate_rating:
                    score: 4.5
                    count: 2300
                  reviews_returned: 10
                  sentiment_breakdown:
                    positive: 8
                    neutral: 1
                    negative: 1
                  plan: pro
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/price-tracker:
    post:
      summary: E-commerce Price Tracker
      description: >
        Extracts product price, title, availability, rating, images, and seller
        info from any e-commerce product page. Uses schema.org, Open Graph, and
        DOM heuristics. Supports Amazon, Shopify, WooCommerce, and generic stores.
      operationId: priceTracker
      tags:
        - Web Intelligence
      parameters:
        - $ref: "#/components/parameters/RapidApiSubscription"
        - $ref: "#/components/parameters/SiteTracePlan"
      requestBody:
        $ref: "#/components/requestBodies/UrlRequest"
      responses:
        "200":
          description: Product price and details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseAnalysisResponse"
              example:
                success: true
                data:
