services:
  - type: web
    name: sitetrace-api-suite
    runtime: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "true"
      - key: RAPIDAPI_PROXY_SECRET
        sync: false
      - key: SITETRACE_INTERNAL_SECRET
        sync: false
